<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6弦ギター コードチャート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f0;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      font-size: 0.82rem;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }

    /* Order toggle (segmented control) */
    .order-toggle {
      display: flex;
      background: #e2e2e2;
      border-radius: 9px;
      padding: 3px;
      gap: 2px;
      margin-bottom: 18px;
    }
    .order-btn {
      background: transparent;
      border: none;
      padding: 7px 18px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .order-btn.active {
      background: #fff;
      color: #222;
      box-shadow: 0 1px 4px rgba(0,0,0,0.13);
    }

    /* Note buttons */
    .note-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
      max-width: 440px;
      width: 100%;
      margin-bottom: 10px;
    }

    @media (max-width: 440px) {
      .note-grid { grid-template-columns: repeat(4, 1fr); }
      .quality-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .note-btn {
      background: #fff;
      border: 1px solid #d0d0d0;
      color: #444;
      padding: 9px 2px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.2;
      transition: background 0.1s, color 0.1s, border-color 0.1s, transform 0.1s;
    }

    .note-btn:hover {
      background: #f5f5f5;
      color: #111;
      border-color: #4a7fd4;
      transform: translateY(-1px);
    }

    .note-btn.active {
      background: #4a7fd4;
      border-color: #3a6fc4;
      color: #fff;
      transform: translateY(-1px);
    }

    /* Quality buttons */
    .quality-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
      max-width: 440px;
      width: 100%;
      margin-bottom: 26px;
    }

    .quality-btn {
      background: #fff;
      border: 1px solid #d0d0d0;
      color: #555;
      padding: 8px 2px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      transition: background 0.1s, color 0.1s, border-color 0.1s, transform 0.1s;
    }

    .quality-btn:hover {
      background: #f5f5f5;
      color: #111;
      border-color: #e07b3a;
      transform: translateY(-1px);
    }

    .quality-btn.active {
      background: #e07b3a;
      border-color: #c96a2a;
      color: #fff;
      transform: translateY(-1px);
    }

    /* Card */
    .card {
      background: #fff;
      border: 1px solid #d8d8d8;
      border-radius: 20px;
      padding: 28px 28px 20px;
      text-align: center;
      min-width: 220px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .chord-name {
      font-size: 2.2rem;
      font-weight: 800;
      color: #4a7fd4;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .chord-notes {
      color: #999;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .placeholder {
      color: #ccc;
      font-size: 0.95rem;
      padding: 28px 16px;
    }

    svg { display: block; margin: 0 auto; }

    .fingering-note {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #bbb;
      letter-spacing: 0.03em;
    }

    .play-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #4a7fd4;
      border: none;
      color: #fff;
      padding: 10px 22px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.1s, transform 0.1s;
    }
    .play-btn:hover  { background: #3a6fc4; transform: scale(1.04); }
    .play-btn:active { transform: scale(0.96); }
    .play-btn.playing { background: #e07b3a; }

    /* Circle of fifths visual */
    .circle-wrap {
      display: none;
      margin-bottom: 16px;
      touch-action: manipulation;
    }
    .circle-wrap.visible { display: block; }
    .circle-wrap svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>6弦ギター コードチャート</h1>
  <p class="subtitle">チューニング: E A D G B e (低→高)</p>

  <div class="order-toggle">
    <button class="order-btn active" id="chromBtn">半音順</button>
    <button class="order-btn"        id="cofBtn">五度圏</button>
    <button class="order-btn"        id="circleBtn">サークル</button>
  </div>

  <div class="note-grid"  id="noteGrid"></div>
  <div class="circle-wrap" id="circleWrap"></div>
  <div class="quality-grid" id="qualityGrid"></div>

  <div class="card" id="card">
    <p class="placeholder">音名とコードタイプを選択してください</p>
  </div>

  <script>
  // ── Constants ──────────────────────────────────────────────────────────────
  const NOTES    = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const N_LABELS = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

  // Note orders
  const CHROM_ORDER = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const COF_ORDER   = ['C','G','D','A','E','B','F#','C#','G#','D#','A#','F'];

  // Button labels per order (COF flat side uses flat names)
  const CHROM_BTN_LABELS = {
    C:'C', 'C#':'C♯', D:'D', 'D#':'D♯', E:'E', F:'F',
    'F#':'F♯', G:'G', 'G#':'G♯', A:'A', 'A#':'A♯', B:'B',
  };
  const COF_BTN_LABELS = {
    C:'C', G:'G', D:'D', A:'A', E:'E', B:'B',
    'F#':'F♯', 'C#':'D♭', 'G#':'A♭', 'D#':'E♭', 'A#':'B♭', F:'F',
  };

  const QUALITIES = ['maj','m','7','m7','maj7','aug','dim'];
  const Q_LABELS  = {maj:'Major', m:'Minor', '7':'7th', m7:'m7', maj7:'maj7', aug:'aug', dim:'dim'};

  const STRING_NAMES = ['E','A','D','G','B','e'];

  // Intervals for each quality (semitones from root)
  const INTERVALS = {
    maj:  [0,4,7],
    m:    [0,3,7],
    '7':  [0,4,7,10],
    m7:   [0,3,7,10],
    maj7: [0,4,7,11],
    aug:  [0,4,8],
    dim:  [0,3,6],
  };

  // ── Chord note label builder ────────────────────────────────────────────────
  function chordNotes(note, quality) {
    const root = NOTES.indexOf(note);
    return INTERVALS[quality].map(i => N_LABELS[(root + i) % 12]).join(' · ');
  }

  function chordLabel(note, quality) {
    const n = N_LABELS[NOTES.indexOf(note)];
    if (quality === 'maj') return n;
    if (quality === 'm')   return n + 'm';
    return n + quality;
  }

  // ── Moveable shape templates ────────────────────────────────────────────────
  // Offsets from root fret; -1 = mute string
  // E-shape: root on string 0 (low E)
  const E_SHAPE = {
    maj:  { off:[0,2,2,1,0,0], f:[1,3,4,2,1,1], barre:true  },
    m:    { off:[0,2,2,0,0,0], f:[1,3,4,0,0,0], barre:true  },
    '7':  { off:[0,2,0,1,0,0], f:[1,3,0,2,0,0], barre:true  },
    m7:   { off:[0,2,0,0,0,0], f:[1,3,0,0,0,0], barre:true  },
    maj7: { off:[0,2,1,1,0,0], f:[1,3,2,2,0,0], barre:true  },
    aug:  { off:[0,3,2,1,1,0], f:[0,4,3,2,2,0], barre:false },
    dim:  { off:[0,1,2,0,-1,-1], f:[0,1,2,0,0,0], barre:false },
  };

  // A-shape: root on string 1 (A); string 0 always muted
  const A_SHAPE = {
    maj:  { off:[-1,0,2,2,2,0], f:[0,1,2,3,4,1], barre:true,  bf:1, bt:5 },
    m:    { off:[-1,0,2,2,1,0], f:[0,1,3,4,2,1], barre:true,  bf:1, bt:5 },
    '7':  { off:[-1,0,2,0,2,0], f:[0,1,2,0,3,0], barre:true,  bf:1, bt:5 },
    m7:   { off:[-1,0,2,0,1,0], f:[0,1,3,0,2,0], barre:false },
    maj7: { off:[-1,0,2,1,2,0], f:[0,1,3,2,4,0], barre:false },
    aug:  { off:[-1,0,3,2,2,1], f:[0,1,4,3,2,1], barre:false },
    dim:  { off:[-1,0,1,2,1,-1], f:[0,1,2,3,2,0], barre:false },
  };

  // Root fret of each note on each string type
  const E_ROOT = {C:8,'C#':9,D:10,'D#':11,E:0,F:1,'F#':2,G:3,'G#':4,A:5,'A#':6,B:7};
  const A_ROOT = {C:3,'C#':4,D:5,'D#':6,E:7,F:8,'F#':9,G:10,'G#':11,A:0,'A#':1,B:2};

  // ── Open chord overrides ────────────────────────────────────────────────────
  const OPEN = {
    // Major open positions
    'C-maj':  { strings:[-1,3,2,0,1,0],  fingers:[0,3,2,0,1,0], baseFret:1 },
    'D-maj':  { strings:[-1,-1,0,2,3,2], fingers:[0,0,0,1,3,2], baseFret:1 },
    'G-maj':  { strings:[3,2,0,0,0,3],   fingers:[2,1,0,0,0,3], baseFret:1 },
    'A-maj':  { strings:[-1,0,2,2,2,0],  fingers:[0,0,1,2,3,0], baseFret:1 },
    // Minor open
    'A-m':    { strings:[-1,0,2,2,1,0],  fingers:[0,0,2,3,1,0], baseFret:1 },
    'D-m':    { strings:[-1,-1,0,2,3,1], fingers:[0,0,0,2,3,1], baseFret:1 },
    // 7th open
    'G-7':    { strings:[3,2,0,0,0,1],   fingers:[3,2,0,0,0,1], baseFret:1 },
    'A-7':    { strings:[-1,0,2,0,2,0],  fingers:[0,0,2,0,3,0], baseFret:1 },
    'D-7':    { strings:[-1,-1,0,2,1,2], fingers:[0,0,0,2,1,3], baseFret:1 },
    'C-7':    { strings:[-1,3,2,3,1,0],  fingers:[0,3,2,4,1,0], baseFret:1 },
    // m7 open
    'A-m7':   { strings:[-1,0,2,0,1,0],  fingers:[0,0,2,0,1,0], baseFret:1 },
    'D-m7':   { strings:[-1,-1,0,2,1,1], fingers:[0,0,0,2,1,1], baseFret:1 },
    // maj7 open
    'A-maj7': { strings:[-1,0,2,1,2,0],  fingers:[0,0,3,1,4,0], baseFret:1 },
    'C-maj7': { strings:[-1,3,2,0,0,0],  fingers:[0,3,2,0,0,0], baseFret:1 },
    // aug open
    'A-aug':  { strings:[-1,0,3,2,2,1],  fingers:[0,0,4,2,3,1], baseFret:1 },
    // dim open
    'A-dim':  { strings:[-1,0,1,2,1,-1], fingers:[0,0,1,2,1,0], baseFret:1 },
    'D-dim':  { strings:[-1,-1,0,1,3,1], fingers:[0,0,0,1,3,1], baseFret:1 },
  };

  // ── Chord builder ───────────────────────────────────────────────────────────
  function buildChord(note, quality) {
    const key = `${note}-${quality}`;
    if (OPEN[key]) return OPEN[key];

    const eRoot = E_ROOT[note];

    // Use E-shape when root fret ≤ 7 (keeps chord in a playable range)
    if (eRoot <= 7) {
      const sh = E_SHAPE[quality];
      const strings = sh.off.map(o => o === -1 ? -1 : eRoot + o);
      const baseFret = eRoot === 0 ? 1 : eRoot;
      const barre = (sh.barre && eRoot > 0) ? { fret: eRoot, from: 0, to: 5 } : null;
      return { strings, fingers: sh.f, baseFret, barre };
    }

    // Otherwise use A-shape
    const aRoot = A_ROOT[note];
    const sh = A_SHAPE[quality];
    const strings = sh.off.map(o => o === -1 ? -1 : aRoot + o);
    const baseFret = aRoot === 0 ? 1 : aRoot;
    const barre = (sh.barre && aRoot > 0) ? { fret: aRoot, from: sh.bf ?? 1, to: sh.bt ?? 5 } : null;
    return { strings, fingers: sh.f, baseFret, barre };
  }

  // ── SVG diagram builder ─────────────────────────────────────────────────────
  function buildSVG(chord, ariaLabel) {
    const NS = 6, NF = 4;
    const SP = 28, FP = 46, LM = 34, TM = 52;
    const W = LM * 2 + (NS - 1) * SP;
    const H = TM + NF * FP + 28;
    const sx = Array.from({length: NS}, (_, i) => LM + i * SP);
    const fy = Array.from({length: NF + 1}, (_, i) => TM + i * FP);
    const p = [];

    // Fretboard
    p.push(`<rect x="${sx[0]-1}" y="${fy[0]}" width="${sx[NS-1]-sx[0]+2}" height="${fy[NF]-fy[0]}" fill="#fdf6ec" rx="2"/>`);

    // Nut / top line
    if (chord.baseFret === 1) {
      p.push(`<rect x="${sx[0]-2}" y="${fy[0]-5}" width="${sx[NS-1]-sx[0]+4}" height="9" rx="4" fill="#5a4a3a"/>`);
    } else {
      p.push(`<line x1="${sx[0]}" y1="${fy[0]}" x2="${sx[NS-1]}" y2="${fy[0]}" stroke="#bbb" stroke-width="2"/>`);
      p.push(`<text x="${sx[NS-1]+10}" y="${fy[0]+5}" fill="#888" font-size="13" font-family="sans-serif">${chord.baseFret}fr</text>`);
    }

    // Fret lines
    for (let f = 1; f <= NF; f++)
      p.push(`<line x1="${sx[0]}" y1="${fy[f]}" x2="${sx[NS-1]}" y2="${fy[f]}" stroke="#d8c8a8" stroke-width="1.5"/>`);

    // String lines
    const strThick  = [2.2, 1.9, 1.6, 1.3, 1.1, 1.0];
    const strColors = ['#8a7060','#9a8070','#9a8070','#9a8070','#aaa090','#aaa090'];
    for (let s = 0; s < NS; s++)
      p.push(`<line x1="${sx[s]}" y1="${fy[0]}" x2="${sx[s]}" y2="${fy[NF]}" stroke="${strColors[s]}" stroke-width="${strThick[s]}"/>`);

    // Mute / Open markers
    for (let s = 0; s < NS; s++) {
      const fret = chord.strings[s];
      const cx = sx[s], cy = TM - 20;
      if (fret === -1) {
        p.push(`<line x1="${cx-7}" y1="${cy-7}" x2="${cx+7}" y2="${cy+7}" stroke="#d0453a" stroke-width="2.5" stroke-linecap="round"/>`);
        p.push(`<line x1="${cx+7}" y1="${cy-7}" x2="${cx-7}" y2="${cy+7}" stroke="#d0453a" stroke-width="2.5" stroke-linecap="round"/>`);
      } else if (fret === 0) {
        p.push(`<circle cx="${cx}" cy="${cy}" r="8" fill="none" stroke="#3a9e5a" stroke-width="2.5"/>`);
      }
    }

    // Barre bar
    if (chord.barre) {
      const b = chord.barre;
      const y  = TM + (b.fret - chord.baseFret) * FP + FP / 2;
      const x1 = sx[b.from] - 14, x2 = sx[b.to] + 14;
      p.push(`<rect x="${x1}" y="${y-12}" width="${x2-x1}" height="24" rx="12" fill="#4a7fd4"/>`);
      p.push(`<text x="${(sx[b.from]+sx[b.to])/2}" y="${y+5}" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="sans-serif">1</text>`);
    }

    // Finger dots
    for (let s = 0; s < NS; s++) {
      const fret = chord.strings[s];
      if (fret <= 0) continue;
      if (chord.barre && fret === chord.barre.fret && s >= chord.barre.from && s <= chord.barre.to) continue;
      const y = TM + (fret - chord.baseFret) * FP + FP / 2;
      p.push(`<circle cx="${sx[s]}" cy="${y}" r="13" fill="#c0392b"/>`);
      if (chord.fingers[s])
        p.push(`<text x="${sx[s]}" y="${y+5}" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="sans-serif">${chord.fingers[s]}</text>`);
    }

    // String labels
    for (let s = 0; s < NS; s++)
      p.push(`<text x="${sx[s]}" y="${H-4}" text-anchor="middle" fill="#aaa" font-size="12" font-family="sans-serif">${STRING_NAMES[s]}</text>`);

    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" role="img" aria-label="${ariaLabel}">${p.join('')}</svg>`;
  }

  // ── Audio synthesis ─────────────────────────────────────────────────────────
  // Open string frequencies: low E, A, D, G, B, high e
  const OPEN_FREQ = [82.407, 110.000, 146.832, 195.998, 246.942, 329.628];

  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // Synthesize a plucked string tone using sine harmonics + fast decay
  function synthNote(ctx, freq, startTime, vol) {
    const master = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = freq * 6;
    filter.Q.value = 0.5;
    master.connect(filter);
    filter.connect(ctx.destination);

    // Fundamental + harmonics
    [[1, 0.55], [2, 0.25], [3, 0.12], [4, 0.05], [5, 0.03]].forEach(([h, amp]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq * h;
      osc.connect(gain);
      gain.connect(master);
      gain.gain.setValueAtTime(amp, startTime);
      // Higher harmonics decay faster (like a real string)
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 2.0 / h);
      osc.start(startTime);
      osc.stop(startTime + 2.2);
    });

    master.gain.setValueAtTime(vol, startTime);
    master.gain.exponentialRampToValueAtTime(0.0001, startTime + 2.2);
  }

  function playChordAudio(chord, btn) {
    const ctx = getAudioCtx();

    // Collect active string frequencies (skip muted strings)
    const freqs = chord.strings
      .map((fret, i) => fret >= 0 ? OPEN_FREQ[i] * Math.pow(2, fret / 12) : null)
      .filter(f => f !== null);

    if (freqs.length === 0) return;

    const vol       = 0.38 / freqs.length;
    const arpDelay  = 0.10;   // seconds between each arpeggio note
    const chordGap  = 0.15;   // pause before chord strum
    const now       = ctx.currentTime + 0.05;

    // 1. Arpeggio: low → high
    freqs.forEach((freq, i) => synthNote(ctx, freq, now + i * arpDelay, vol * 1.2));

    // 2. Chord: all strings together
    const chordStart = now + freqs.length * arpDelay + chordGap;
    freqs.forEach(freq => synthNote(ctx, freq, chordStart, vol));

    // Visual feedback on the button
    if (btn) {
      btn.classList.add('playing');
      const totalMs = (freqs.length * arpDelay + chordGap + 0.3) * 1000;
      setTimeout(() => btn.classList.remove('playing'), totalMs);
    }
  }

  // ── Circle of Fifths SVG builder ────────────────────────────────────────────
  // Positions (clockwise from 12 o'clock)
  const COF_MAJOR_NOTES  = ['C','G','D','A','E','B','F#','C#','G#','D#','A#','F'];
  const COF_MINOR_NOTES  = ['A','E','B','F#','C#','G#','D#','A#','F','C','G','D'];
  // Display labels (flat names for the flat side)
  const COF_MAJ_LABELS = ['C','G','D','A','E','B','F♯/G♭','D♭','A♭','E♭','B♭','F'];
  const COF_MIN_LABELS = ['Am','Em','Bm','F♯m','C♯m','G♯m','E♭m','B♭m','Fm','Cm','Gm','Dm'];

  function arcSeg(cx, cy, r1, r2, a1, a2) {
    const [c1,s1,c2,s2] = [Math.cos(a1),Math.sin(a1),Math.cos(a2),Math.sin(a2)];
    return [
      `M${(cx+r2*c1).toFixed(2)},${(cy+r2*s1).toFixed(2)}`,
      `A${r2},${r2},0,0,1,${(cx+r2*c2).toFixed(2)},${(cy+r2*s2).toFixed(2)}`,
      `L${(cx+r1*c2).toFixed(2)},${(cy+r1*s2).toFixed(2)}`,
      `A${r1},${r1},0,0,0,${(cx+r1*c1).toFixed(2)},${(cy+r1*s1).toFixed(2)}`,
      'Z'
    ].join(' ');
  }

  function buildCircleSVG() {
    const SZ=310, cx=155, cy=155;
    const R_OUT=148, R_MID=98, R_IN=54, GAP=0.038;
    const DEG = Math.PI/180;
    const p = [`<svg width="${SZ}" height="${SZ}" viewBox="0 0 ${SZ} ${SZ}">`];

    // Centre hole
    p.push(`<circle cx="${cx}" cy="${cy}" r="${R_IN-1}" fill="#f5f5f5" stroke="#ddd" stroke-width="1.5"/>`);
    p.push(`<text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#bbb" font-size="11" font-family="sans-serif">5度圏</text>`);

    for (let i = 0; i < 12; i++) {
      const base = (i*30 - 90) * DEG;
      const a1   = base + GAP, a2 = base + 30*DEG - GAP;
      const mid  = base + 15*DEG;

      const majNote = COF_MAJOR_NOTES[i];
      const minNote = COF_MINOR_NOTES[i];
      const majSel  = majNote === selNote && selQuality !== 'm';
      const minSel  = minNote === selNote && selQuality === 'm';

      // Outer segment (major)
      const majFill = majSel ? '#4a7fd4' : '#e8eaf6';
      const majTxt  = majSel ? '#fff'    : '#333';
      p.push(`<path d="${arcSeg(cx,cy,R_MID,R_OUT,a1,a2)}" fill="${majFill}" stroke="#f0f0f0" stroke-width="2" style="cursor:pointer" onclick="cofClick('${majNote}','major')"/>`);

      // Inner segment (minor)
      const minFill = minSel ? '#e07b3a' : '#f5ede8';
      const minTxt  = minSel ? '#fff'    : '#777';
      p.push(`<path d="${arcSeg(cx,cy,R_IN,R_MID,a1,a2)}" fill="${minFill}" stroke="#f0f0f0" stroke-width="2" style="cursor:pointer" onclick="cofClick('${minNote}','minor')"/>`);

      // Major label
      const mlr = (R_MID+R_OUT)/2;
      const mlx = (cx+mlr*Math.cos(mid)).toFixed(1);
      const mly = (cy+mlr*Math.sin(mid)).toFixed(1);
      const majLbl = COF_MAJ_LABELS[i];
      if (majLbl.includes('/')) {
        const [top,bot] = majLbl.split('/');
        p.push(`<text x="${mlx}" y="${mly}" text-anchor="middle" dominant-baseline="middle" fill="${majTxt}" font-size="11" font-weight="700" font-family="sans-serif" pointer-events="none"><tspan x="${mlx}" dy="-6">${top}</tspan><tspan x="${mlx}" dy="13">${bot}</tspan></text>`);
      } else {
        p.push(`<text x="${mlx}" y="${mly}" text-anchor="middle" dominant-baseline="middle" fill="${majTxt}" font-size="14" font-weight="700" font-family="sans-serif" pointer-events="none">${majLbl}</text>`);
      }

      // Minor label
      const inr = (R_IN+R_MID)/2;
      const inx = (cx+inr*Math.cos(mid)).toFixed(1);
      const iny = (cy+inr*Math.sin(mid)).toFixed(1);
      p.push(`<text x="${inx}" y="${iny}" text-anchor="middle" dominant-baseline="middle" fill="${minTxt}" font-size="10" font-weight="600" font-family="sans-serif" pointer-events="none">${COF_MIN_LABELS[i]}</text>`);
    }

    p.push('</svg>');
    return p.join('');
  }

  // Called by SVG onclick (must be global)
  function cofClick(note, type) {
    selNote = note;
    selQuality = type === 'minor' ? 'm' : 'maj';
    refreshButtons();
    updateCircle();
    render(true);
  }

  function updateCircle() {
    const wrap = document.getElementById('circleWrap');
    if (displayMode === 'circle') wrap.innerHTML = buildCircleSVG();
  }

  // ── State & render ──────────────────────────────────────────────────────────
  let selNote = 'C', selQuality = 'maj', displayMode = 'chrom';

  function render(autoPlay = false) {
    const chord    = buildChord(selNote, selQuality);
    const label    = chordLabel(selNote, selQuality);
    const notes    = chordNotes(selNote, selQuality);
    const hasBarre = !!chord.barre;

    document.getElementById('card').innerHTML = `
      <div class="chord-name">${label}</div>
      <div class="chord-notes">${notes}</div>
      ${buildSVG(chord, label + ' コードダイアグラム')}
      <p class="fingering-note">${hasBarre
        ? '青バー = 人差し指でセーハ ／ 赤丸 = 各指の押弦位置'
        : '赤丸の数字 = 指番号 (1=人差指 2=中指 3=薬指 4=小指)'}</p>
      <button class="play-btn" id="playBtn">&#9654; 再生</button>
    `;
    document.getElementById('playBtn').addEventListener('click', (e) => {
      playChordAudio(chord, e.currentTarget);
    });
    if (autoPlay) playChordAudio(chord, document.getElementById('playBtn'));
  }

  function refreshButtons() {
    document.querySelectorAll('.note-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.note === selNote));
    document.querySelectorAll('.quality-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.q === selQuality));
  }

  // ── Build note buttons ──────────────────────────────────────────────────────
  function buildNoteButtons() {
    const grid   = document.getElementById('noteGrid');
    const order  = displayMode === 'cof' ? COF_ORDER : CHROM_ORDER;
    const labels = displayMode === 'cof' ? COF_BTN_LABELS : CHROM_BTN_LABELS;
    grid.innerHTML = '';
    order.forEach(n => {
      const btn = document.createElement('button');
      btn.className    = 'note-btn' + (n === selNote ? ' active' : '');
      btn.dataset.note = n;
      btn.innerHTML    = labels[n]
        .replace('♯', '<span style="font-size:0.8em">♯</span>')
        .replace('♭', '<span style="font-size:0.8em">♭</span>');
      btn.addEventListener('click', () => { selNote = n; refreshButtons(); render(true); });
      grid.appendChild(btn);
    });
  }

  function setDisplayMode(mode) {
    displayMode = mode;
    ['chromBtn','cofBtn','circleBtn'].forEach(id => {
      document.getElementById(id).classList.toggle('active',
        (id === 'chromBtn' && mode === 'chrom') ||
        (id === 'cofBtn'   && mode === 'cof')   ||
        (id === 'circleBtn'&& mode === 'circle'));
    });
    const noteGrid   = document.getElementById('noteGrid');
    const circleWrap = document.getElementById('circleWrap');
    if (mode === 'circle') {
      noteGrid.style.display   = 'none';
      circleWrap.classList.add('visible');
      updateCircle();
    } else {
      noteGrid.style.display   = '';
      circleWrap.classList.remove('visible');
      buildNoteButtons();
    }
    syncQualityButtons();
  }

  // ── Build UI ────────────────────────────────────────────────────────────────
  const qualityGrid = document.getElementById('qualityGrid');

  buildNoteButtons();

  QUALITIES.forEach(q => {
    const btn = document.createElement('button');
    btn.className   = 'quality-btn';
    btn.dataset.q   = q;
    btn.textContent = Q_LABELS[q];
    btn.addEventListener('click', () => { selQuality = q; refreshButtons(); updateCircle(); render(true); });
    qualityGrid.appendChild(btn);
  });

  function syncQualityButtons() {
    document.querySelectorAll('.quality-btn').forEach(b => {
      const hide = displayMode === 'circle' && (b.dataset.q === 'maj' || b.dataset.q === 'm');
      b.style.display = hide ? 'none' : '';
    });
  }

  document.getElementById('chromBtn') .addEventListener('click', () => setDisplayMode('chrom'));
  document.getElementById('cofBtn')   .addEventListener('click', () => setDisplayMode('cof'));
  document.getElementById('circleBtn').addEventListener('click', () => setDisplayMode('circle'));

  // Initial display
  refreshButtons();
  render(false);
  </script>
</body>
</html>
